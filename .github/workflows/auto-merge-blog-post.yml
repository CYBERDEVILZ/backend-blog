name: Auto-merge daily blog post

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only auto-merge PRs created by the scheduled agent (github-actions bot)
    if: startsWith(github.head_ref, 'post/')
    steps:
      - name: Verify only _posts/ was changed
        uses: actions/github-script@v7
        id: verify
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const changedPaths = files.data.map(f => f.filename);
            const allPostFiles = changedPaths.every(p => p.startsWith('_posts/'));
            if (!allPostFiles) {
              core.setFailed(`PR touches files outside _posts/: ${changedPaths.join(', ')}`);
            }
            core.setOutput('safe', 'true');

      - name: Approve PR
        if: steps.verify.outputs.safe == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Auto-approved: daily blog post PR touches only `_posts/`.',
            });

      - name: Merge PR
        if: steps.verify.outputs.safe == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
              commit_title: context.payload.pull_request.title,
              commit_message: 'Auto-merged daily blog post.',
            });
