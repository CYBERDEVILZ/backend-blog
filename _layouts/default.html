<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent2: #4fa3e0;
      --text: #e2e4f0;
      --muted: #8b8fa8;
      --code-bg: #13161f;
      --green: #4ade80;
      --orange: #fb923c;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.7;
      font-size: 16px;
    }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      background: var(--surface);
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .site-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    nav a {
      margin-left: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    nav a:hover { color: var(--text); }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Tags */
    .tag {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.75rem;
      font-family: monospace;
      margin-right: 0.3rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="/">Posts</a>
        <a href="/about">About</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>{{ site.title }} &mdash; {{ site.description }}</p>
  </footer>
</body>
</html>
